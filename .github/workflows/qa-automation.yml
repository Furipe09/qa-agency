name: QA Tests
# Diz ao GitHub para rodar os testes sempre que houver alteração no código.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
# runs-on: ubuntu-latest: Define que o teste rodará em uma máquina Linux fornecida pelo GitHub.
jobs:
  qa-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt
      # Passo crucial, pois instala o Chrome, Firefox e WebKit dentro da máquina do GitHub para que os testes de interface funcionem.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Run Pytest
        run: pytest --html=pytest-report.html --self-contained-html
        # Garante que, se um teste falhar, o GitHub salve um "print" ou vídeo do erro para você analisar depois.
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload Pytest report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.html

